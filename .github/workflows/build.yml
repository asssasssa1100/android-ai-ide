name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract project ZIP (if present)
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -1)
          if [ -n "$ZIP_FILE" ]; then
            unzip -q "$ZIP_FILE" -d /tmp/extracted
            INNER=$(ls /tmp/extracted | head -1)
            cp -r /tmp/extracted/$INNER/. .
          fi

      - name: Bootstrap Gradle 8.2 wrapper (auto-creates gradlew)
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          export PATH="/opt/gradle/gradle-8.2/bin:$PATH"
          echo "/opt/gradle/gradle-8.2/bin" >> $GITHUB_PATH
          gradle wrapper --gradle-version=8.2 --distribution-type=bin
          chmod +x gradlew
          echo "✅ gradlew ready: $(ls -lh gradlew)"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses + Install components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;25.2.9519653"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log
          exit ${PIPESTATUS[0]}
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8"

      - name: Show error summary (if failed)
        if: failure()
        run: |
          grep -iE "error:|FAILED|Could not|No such file|No module|Caused by" /tmp/build.log | head -40 || true
          echo "--- آخر 80 سطر ---"
          tail -80 /tmp/build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TradingLab-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
